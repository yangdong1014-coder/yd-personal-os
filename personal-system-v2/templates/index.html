{% extends "base.html" %}

{% block title %}首页 · 个人能力操作系统{% endblock %}

{% block content %}
<header class="page-header">
  <div class="page-header-row">
    <div>
      <h1 class="page-title">指挥部总览</h1>
      <p class="page-subtitle">当前最重要的目标、项目与任务</p>
    </div>
    <button type="button" id="ai-briefing-btn" class="btn btn-sm btn-ai">AI 今日简报</button>
  </div>
  <span class="version-badge">v1.1-ai</span>
  {% if not ai_enabled %}
  <p class="form-hint">AI 功能未启用：请设置 DEEPSEEK_API_KEY（环境变量或 .env 文件）后重启服务</p>
  {% endif %}
</header>

<section class="section-card" id="dashboard-goal">
  <h2>当前主线目标</h2>
  <div id="dashboard-goal-content"></div>
</section>

<section class="section-card" id="dashboard-projects">
  <h2>本周进行中的项目</h2>
  <div id="dashboard-projects-content"></div>
</section>

<section class="section-card" id="dashboard-tasks">
  <h2>今日必须推进的任务</h2>
  <div id="dashboard-tasks-content"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/ai-modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
{% endblock %}
