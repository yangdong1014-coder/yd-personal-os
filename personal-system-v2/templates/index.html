{% extends "base.html" %}

{% block title %}首页 · 个人能力操作系统{% endblock %}

{% block content %}
<header class="page-header">
  <div class="page-header-row">
    <div>
      <h1 class="page-title">指挥部总览</h1>
      <p class="page-subtitle">先看今日行动，再看重点项目</p>
    </div>
    <div class="header-actions">
      <button type="button" id="ai-briefing-btn" class="btn btn-sm btn-ai">AI 今日简报</button>
      <button type="button" id="ai-dispatch-btn" class="btn btn-sm btn-ai">AI 行动分发</button>
    </div>
  </div>
  {% if not ai_enabled %}
  <p class="form-hint">AI 功能未启用：请设置 DEEPSEEK_API_KEY（环境变量或 .env 文件）后重启服务</p>
  {% endif %}
</header>

<div class="dashboard-layout dashboard-workbench dashboard-stack">
  <section class="section-card dashboard-span-full dashboard-section-goal" id="dashboard-goal">
    <div class="section-header-row">
      <h2>当前主线目标</h2>
      <span class="section-kicker">最重要方向</span>
    </div>
    <div id="dashboard-goal-content"></div>
  </section>

  <section class="section-card dashboard-span-full dashboard-section-today" id="dashboard-tasks">
    <div class="section-header-row">
      <h2>今日行动</h2>
      <span class="section-kicker">今天必须先做</span>
    </div>
    <div id="dashboard-tasks-content"></div>
  </section>

  <section class="section-card dashboard-span-full dashboard-section-projects" id="dashboard-projects">
    <div class="section-header-row">
      <h2>重点项目</h2>
      <span class="section-kicker">当前最该推进的项目</span>
    </div>
    <div id="dashboard-projects-content"></div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/ai-modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
{% endblock %}
