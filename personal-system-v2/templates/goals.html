{% extends "base.html" %}

{% block title %}目标 · 个人能力操作系统{% endblock %}

{% block content %}
<header class="page-header">
  <h1 class="page-title">目标系统</h1>
  <p class="page-subtitle">目标牵引，项目拆解 — AI 辅助拆解可执行项目</p>
  {% if not ai_enabled %}
  <p class="form-hint">AI 功能未启用：请设置 DEEPSEEK_API_KEY（环境变量或 .env 文件）后重启服务</p>
  {% endif %}
</header>

<div class="page-split">
  <section class="section-card page-split-side">
    <h2>新建目标</h2>
    <form id="goal-form" class="stacked-form inline-form-stacked">
      <input type="text" id="goal-name" class="input full-width" placeholder="目标名称" required>
      <select id="goal-type" class="select full-width">
        {% for t in goal_types %}
        <option value="{{ t }}"{% if t == '年度' %} selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>
      <button type="submit" class="btn">添加目标</button>
    </form>
  </section>

  <section class="section-card page-split-main">
    <h2>目标列表</h2>
    <div id="goals-list" class="entity-list">
      <div class="empty-state" id="goals-empty">
        <strong>添加第一个目标</strong>
        输入名称与类型后即时保存
      </div>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script>window.GOAL_TYPES = {{ goal_types | tojson }};</script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/ai-modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/goals.js') }}"></script>
{% endblock %}
