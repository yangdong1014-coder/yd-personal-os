<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}个人能力操作系统{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <nav class="top-nav">
    <a href="{{ url_for('index') }}" class="nav-brand">个人能力<span>OS</span></a>
    <div class="nav-links">
      {% for item in nav_items %}
      <a href="{{ item.path }}"
         class="nav-link{% if active_page == item.endpoint %} active{% endif %}">
        {{ item.label }}
      </a>
      {% endfor %}
    </div>
    <button
      type="button"
      id="export-data-btn"
      class="nav-export-btn"
      title="导出全部数据"
      aria-label="导出全部数据"
    >
      <svg class="nav-export-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v9.59l2.3-2.3a1 1 0 1 1 1.4 1.42l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 0 1 1.4-1.42l2.3 2.3V4a1 1 0 0 1 1-1Zm-7 14a1 1 0 0 1 1 1v1h12v-1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z"/>
      </svg>
    </button>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
