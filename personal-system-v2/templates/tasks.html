{% extends "base.html" %}

{% block title %}任务 · 个人能力操作系统{% endblock %}

{% block content %}
<header class="page-header">
  <div class="page-header-row">
    <div>
      <h1 class="page-title">任务执行视图</h1>
      <p class="page-subtitle">先看今日行动，再按项目推进</p>
    </div>
    <div class="header-actions">
      <button type="button" id="create-task-btn" class="btn btn-sm">新建任务</button>
      <button type="button" id="ai-recommend-btn" class="btn btn-sm btn-ai">AI今日推荐</button>
    </div>
  </div>
  {% if not ai_enabled %}
  <p class="form-hint">AI 功能未启用：请设置 DEEPSEEK_API_KEY（环境变量或 .env 文件）后重启服务</p>
  {% endif %}
</header>

<section class="section-card page-main-panel">
  <div class="section-header-row">
    <h2>任务执行列表</h2>
  </div>
  <div id="task-overview" class="task-overview" aria-live="polite"></div>
  <div class="task-view-toggle" role="tablist" aria-label="任务视图">
    <button type="button" class="btn btn-sm task-view-btn is-active" data-view="overview" aria-selected="true">总览模式</button>
    <button type="button" class="btn btn-sm btn-ghost task-view-btn" data-view="project" aria-selected="false">按项目模式</button>
  </div>
  <div id="tasks-list" class="entity-list task-list">
    <div class="empty-state" id="tasks-empty">
      <strong>添加第一个任务</strong>
      点击右上角「新建任务」开始
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>window.TASK_STATUSES = {{ task_statuses | tojson }};</script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/ai-modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/tasks.js') }}"></script>
{% endblock %}
